shell /usr/bin/fish
# =============================================================================
# 1. SUBSISTEMA DE ALERTAS E TELEMETRIA
# =============================================================================

# Inibe a emissão de sinais sonoros pelo sistema em eventos de erro de I/O.
enable_audio_bell no
# Inibe a emissão de alertas visuais (flashes) na janela ativa em eventos de erro.
window_alert_on_bell no

# =============================================================================
# 2. MOTOR TIPOGRÁFICO E RENDERIZAÇÃO
# =============================================================================

# Define a família tipográfica primária. A especificação Nerd Font é mandatória 
# para a correta renderização de glifos no Powerlevel10k e utilitários CLI modernos.
font_family      FiraCode Nerd Font
bold_font        auto
italic_font      auto
bold_italic_font auto

# Dimensionamento do vetor de renderização (em pt).
font_size 13

# =============================================================================
# 3. INTERFACE DE USUÁRIO (UI) E COMPOSITOR
# =============================================================================

# Define o nível de transparência do canal alfa (exige um compositor de janelas ativo).
background_opacity 0.9

# Define a área de respiro (padding) em pixels entre os limites da janela e o buffer de texto.
window_margin_width 8

# =============================================================================
# 4. SUBSISTEMA DE RECONHECIMENTO DE PADRÕES (URL)
# =============================================================================

# Habilita o parsing heurístico de cadeias de caracteres para identificação de hiperlinks.
detect_urls yes
# Define a geometria do sublinhado aplicado às URLs detectadas.
url_style straight
# Delega a resolução da URL ao manipulador (handler) padrão do sistema operacional (ex: xdg-open).
open_url_with default

# =============================================================================
# 5. GERENCIAMENTO E ESTILIZAÇÃO DE ABAS (TABS)
# =============================================================================

# Posicionamento estrutural da barra de abas.
tab_bar_edge top
# Espaçamento vetorial da barra de abas.
tab_bar_margin_width 1.0
tab_bar_margin_height 1.0 0.5

# Ativação do motor gráfico Powerline para os separadores.
tab_bar_style powerline
tab_powerline_style slanted

# Sobrescreve a renderização do título, exibindo exclusivamente o índice numérico da aba.
tab_title_template "{index}"

# Paleta de cores para os estados das abas (Ativa/Inativa).
active_tab_foreground   #0da38a 
active_tab_background   #1d202f
active_tab_font_style   bold-italic
inactive_tab_foreground #ffffff
inactive_tab_background #292945
inactive_tab_font_style normal

# =============================================================================
# 6. MAPEAMENTO DE E/S: TRANSFERÊNCIA DE MEMÓRIA (CLIPBOARD)
# =============================================================================

map ctrl+shift+c copy_to_clipboard
map ctrl+shift+v paste_from_clipboard

# =============================================================================
# 7. MAPEAMENTO DE E/S: CONTROLE DE FLUXO (WINDOW/TAB MANAGEMENT)
# =============================================================================

# Controle de Janelas (Splits/Panes internos)
map ctrl+enter     new_window
map ctrl+shift+l   next_window
map ctrl+shift+h   previous_window
map ctrl+shift+i   next_layout

# Controle de Abas (Tabs do Sistema)
map ctrl+t         new_tab
map ctrl+shift+w   close_tab

# Controle de Processo
# Engatilha a recompilação da matriz de configuração em tempo de execução (Hot-reload).
map ctrl+shift+r   load_config_file

# =============================================================================
# 8. INJEÇÃO DE DEPENDÊNCIAS (THEMING)
# =============================================================================

# Importação do arquivo de manifesto de cores. 
# O arquivo oxocarbon.conf deve estar presente no diretório ~/.config/kitty/.
include oxocarbon.conf