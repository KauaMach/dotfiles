# 1. PARÂMETROS GERAIS E RENDERIZAÇÃO
#----------------------------------------

# Define a variável de ambiente dinamicamente com suporte à expansão de formatação (-F)
set-environment -gF TMUX_PLUGIN_MANAGER_PATH "#{HOME}/.config/tmux/plugins"


# Recarrega a configuração do Tmux
#bind r source-file ~/.tmux.conf \; display "Tmux config reloaded!"

# Suporte mandatório a True Color (24-bit) para interoperabilidade com o emulador
set -g default-terminal "tmux-256color"
set-option -ga terminal-overrides ",alacritty:Tc,xterm-256color:Tc"

# Define a frequência de atualização do barramento de estado para 5 segundos
set-option -g status-interval 5

# Prefixo e Atalhos Base
unbind C-b                              # Desvincula o padrão POSIX para evitar colisões
set -g prefix C-a                       # Altera o prefixo padrão para CTRL+A
bind C-a send-prefix                    # Permite enviar CTRL+A para o terminal

# Comportamento de Janelas e Painéis
#set -g base-index 1                     # Numeração das janelas começa em 1
set -g renumber-windows on              # Reorganiza números das janelas ao fechar uma
setw -g mode-keys vi                    # Ativa atalhos do modo vi HJKL para navegação 
set -g detach-on-destroy off            # Retorna à última sessão ativa ao encerrar
set-option -g mouse on                  # Habilita suporte a mouse para seleção e redimensionamento
set-option -g status-position top       # Posiciona a barra de status no topo da tela

# =======================================
# 2. MAPEAMENTO ESPACIAL (KEYBINDINGS)
#----------------------------------------

# Divisão de janelas no mesmo diretório
bind-key '"' split-window -c "#{pane_current_path}"           # Divide a janela horizontalmente
bind-key % split-window -h -c "#{pane_current_path}"          # Divide a janela verticalmente

# Ativa/desativa sincronização de painéis
bind-key a set-window-option synchronize-panes \; display-message "Sincronização de I/O: #{?pane_synchronized,Ativa,Inativa}"

# Atalhos para navegar entre painéis estilo vi
bind-key h select-pane -L  # Move para o painel à esquerda
bind-key j select-pane -D  # Move para o painel abaixo
bind-key k select-pane -U  # Move para o painel acima
bind-key l select-pane -R  # Move para o painel à direita

# Redimensionamento de painéis
bind-key C-h resize-pane -L 5 # Reduz o painel atual para a esquerda
bind-key C-k resize-pane -U 5 # Reduz o painel atual para cima
bind-key C-j resize-pane -D 5 # Reduz o painel atual para baixo
bind-key C-l resize-pane -R 5 # Reduz o painel atual para a direita

# =======================================
# 3. DECLARAÇÃO DE DEPENDÊNCIAS (TPM)
#----------------------------------------
# Carrega o módulo de status personalizado do Catppuccin
#run '~/.config/.tmux/plugins/catppuccin/tmux/catppuccin.tmux'
run '#{TMUX_PLUGIN_MANAGER_PATH}/catppuccin/tmux/catppuccin.tmux'

# Plugins do Tmux
set -g @plugin 'tmux-plugins/tpm'             # Gerenciador de plugins
set -g @plugin 'tmux-plugins/tmux-sensible'   # Configurações sensatas
set -g @plugin 'tmux-plugins/tmux-resurrect'  # Salva/restaura estado
set -g @plugin 'tmux-plugins/tmux-continuum'  # Salvamento contínuo
set -g @plugin 'tmux-plugins/tmux-cpu'        # Monitoramento de CPU
set -g @plugin 'tmux-plugins/tmux-battery'    # Monitoramento de bateria

# Tema Catppuccin 
set -g @plugin 'catppuccin/tmux#v2.1.3' # See https://github.com/catppuccin/tmux/tags for additional tags

# Ativa restauração automática
set -g @continuum-restore 'on' 
set -g @resurrect-strategy "save" 


# =========================================
# 4. CONFIGURAÇÃO DA INTERFACE (CATPPUCCIN)
# -----------------------------------------

set -g @catppuccin_flavor 'mocha'
set -g @catppuccin_window_status_style "rounded" 

# Ajuste do comprimento da barra de status
set -g status-right-length 100
set -g status-left-length 100

# Limpa conteúdo da barra à esquerda
set -g status-left ""

# Adiciona módulos à barra de status
set -g @catppuccin_host_text "#H"
set -g status-right "#{E:@catppuccin_status_host}"  # Exibe o nome do host com ícone e cor personalizada

set -ag status-right "#{E:@catppuccin_status_application}"  # Exibe o nome do aplicativo ativo
set -ag status-right "#{E:@catppuccin_status_session}"     # Exibe o nome da sessão atual

# Exibe o endereço IP local com ícone e cor personalizada
set -ag status-right "#[bg=#{@thm_crust},fg=#a6e3a1] #[bg=#a6e3a1,fg=#{@thm_crust}]󰩟 #[bg=#{@thm_surface_0},fg=#{@thm_fg}] #(hostname -I | awk '{print $1}') "

# Exibe o uso de CPU com ícone e cor personalizada
set -agF status-right "#{E:@catppuccin_status_cpu}"  

# Módulo Simplificado de Memória (Sem dependência do status_module.conf externo)
set -ag status-right "#[bg=#{@thm_crust},fg=#{@thm_teal}] #[bg=#{@thm_teal},fg=#{@thm_crust}] #[bg=#{@thm_surface_0},fg=#{@thm_fg}] #{ram_percentage} " 

set -ag status-right "#{E:@catppuccin_status_uptime}"      # Exibe o tempo de atividade do sistema
set -agF status-right "#{E:@catppuccin_status_battery}"    # Exibe o status da bateria com ícone e cor personalizada

# Exibe a branch do Git com ícone e cor personalizada
set -ag status-right "#[bg=#{@thm_crust},fg=#89b4fa] #[bg=#89b4fa,fg=#{@thm_crust}] #[bg=#{@thm_surface_0},fg=#{@thm_fg}] #(git -C #{pane_current_path} rev-parse --abbrev-ref HEAD 2>/dev/null || echo 'N/A') "

# ===================================
# 5. INICIALIZAÇÃO DE PLUGINS
#------------------------------------

# Carrega plugins de monitoramento
run '#{TMUX_PLUGIN_MANAGER_PATH}/tmux-cpu/cpu.tmux'
run '#{TMUX_PLUGIN_MANAGER_PATH}/tmux-battery/battery.tmux'

# Carrega o módulo de status personalizado do Catppuccin

#run '~/.config/.tmux/plugins/tpm/tpm'
run '#{TMUX_PLUGIN_MANAGER_PATH}/tpm/tpm'