#89iuv

#=============================================================================
# 1. PARÂMETROS GERAIS E RENDERIZAÇÃO
# =============================================================================

# Define a variável de ambiente dinamicamente com suporte à expansão de formatação (-F)
set-environment -gF TMUX_PLUGIN_MANAGER_PATH "#{HOME}/.config/.tmux/plugins"

# Recarrega a configuração do Tmux
bind r source-file ~/.tmux.conf \; display "Tmux config reloaded!"

# Define a frequência de atualização do barramento de estado para 1 segundos
set-option -g status-interval 1

# Suporte mandatório a True Color (24-bit) para interoperabilidade com o emulador
set -g default-terminal "tmux-256color"

# Prefixo e Atalhos Base
unbind C-b                              # Desvincula o padrão POSIX para evitar colisões
set -g prefix C-a                       # Altera o prefixo padrão para CTRL+A
bind C-a send-prefix                    # Permite enviar CTRL+A para o terminal

# Comportamento de Janelas e Painéis
#set -g base-index 1                     # Numeração das janelas começa em 1
set -g renumber-windows on              # Reorganiza números das janelas ao fechar uma
setw -g mode-keys vi                    # Ativa atalhos do modo vi HJKL para navegação 
set -g detach-on-destroy off            # Retorna à última sessão ativa ao encerrar
set-option -g mouse on                  # Habilita suporte a mouse para seleção e redimensionamento

# =======================================
# 2. MAPEAMENTO ESPACIAL (KEYBINDINGS)
#========================================

# Divisão de janelas no mesmo diretório
bind-key '"' split-window -c "#{pane_current_path}"           # Divide a janela horizontalmente
bind-key % split-window -h -c "#{pane_current_path}"          # Divide a janela verticalmente

# Ativa/desativa sincronização de painéis
bind-key a set-window-option synchronize-panes \; display-message "Sincronização de I/O: #{?pane_synchronized,Ativa,Inativa}"

# Atalhos para navegar entre painéis estilo vi
bind-key h select-pane -L  # Move para o painel à esquerda
bind-key j select-pane -D  # Move para o painel abaixo
bind-key k select-pane -U  # Move para o painel acima
bind-key l select-pane -R  # Move para o painel à direita

# Redimensionamento de painéis
bind-key C-h resize-pane -L 5 # Reduz o painel atual para a esquerda
bind-key C-k resize-pane -U 5 # Reduz o painel atual para cima
bind-key C-j resize-pane -D 5 # Reduz o painel atual para baixo
bind-key C-l resize-pane -R 5 # Reduz o painel atual para a direita


# =======================================
# 3. DECLARAÇÃO DE DEPENDÊNCIAS (TPM)
#========================================


set -g @plugin 'tmux-plugins/tpm'             # Gerenciador de plugins do Tmux
set -g @plugin 'tmux-plugins/tmux-sensible'   # Configurações sensatas
set -g @plugin 'tmux-plugins/tmux-resurrect'  # Salva/restaura estado
set -g @plugin 'tmux-plugins/tmux-continuum'  # Salvamento contínuo
set -g @plugin 'tmux-plugins/tmux-battery'    # Monitoramento de bateria
set -g @plugin 'tmux-plugins/tmux-cpu'        # Telemetria de CPU e RAM
set -g @plugin 'catppuccin/tmux'              # Tema Catppuccin para Tmux


# Ativa restauração automática
#set -g @continuum-restore 'on' 
#set -g @resurrect-strategy "save" 

# =============================================================================
# 4. CONFIGURAÇÃO DA INTERFACE VISUAL (CATPPUCCIN)
# =============================================================================

# Configuração do Tema Catppuccin
set -g @catppuccin_flavor "macchiato"
set -g @catppuccin_status_background "none"
set -g @catppuccin_window_status_style "none"
set -g @catppuccin_pane_status_enabled "off"
set -g @catppuccin_pane_border_status "off"

# Barra Esquerda: Aparência e Comportamento
set -g status-left-length 100
set -g status-left ""

# Quando o prefixo é acionado, a pílula assume fundo vermelho. Em repouso, fundo default (transparente).
set -ga status-left "#{?client_prefix,#{#[bg=#{@thm_red},fg=#{@thm_bg},bold]  #S },#{#[bg=default,fg=#{@thm_green}]  #S }}"
set -ga status-left "#[bg=default,fg=#{@thm_overlay_0},none]│"
set -ga status-left "#[bg=default,fg=#{@thm_maroon}]  #{pane_current_command} "
set -ga status-left "#[bg=default,fg=#{@thm_overlay_0},none]│"
set -ga status-left "#[bg=default,fg=#{@thm_blue}]  #{=/-32/...:#{s|$USER|~|:#{b:pane_current_path}}} "
set -ga status-left "#[bg=default,fg=#{@thm_overlay_0},none]#{?window_zoomed_flag,│,}"
set -ga status-left "#[bg=default,fg=#{@thm_yellow}]#{?window_zoomed_flag,  zoom ,}"

# Barra Direita: Aparência e Comportamento
set -g status-right-length 100
set -g status-right ""

# Módulo: Endereço IP Local (LAN)
set -ga status-right "#[bg=default,fg=#{@thm_teal}] 󰩟 #(hostname -I | awk '{print $1}') "
set -ga status-right "#[bg=default,fg=#{@thm_overlay_0},none]│"

# Módulo: Telemetria de CPU
set -ga status-right "#[bg=default,fg=#{@thm_peach}]  #{cpu_percentage} "
set -ga status-right "#[bg=default,fg=#{@thm_overlay_0},none]│"

# Módulo: Telemetria de Memória RAM
set -ga status-right "#[bg=default,fg=#{@thm_sky}]  #{ram_percentage} "
set -ga status-right "#[bg=default,fg=#{@thm_overlay_0},none]│"

# Módulo: Bateria
set -ga status-right "#{?#{e|>=:10,#{battery_percentage}},#{#[bg=#{@thm_red},fg=#{@thm_bg}]},#{#[bg=default,fg=#{@thm_pink}]}} #{battery_icon} #{battery_percentage} "
set -ga status-right "#[bg=default,fg=#{@thm_overlay_0},none]"

# Módulo: Data e Hora
#set -ga status-right "#[bg=default,fg=#{@thm_blue}] 󰭦 %Y-%m-%d 󰅐 %H:%M "

# =============================================================================
# 4. PARÂMETROS ESTRUTURAIS DO DAEMON (TMUX)
# =============================================================================

set -g status-position top
# Diretiva Crítica: Fundo global da barra definido como herança do emulador (Transparente)
set -g status-style "bg=default"
set -g status-justify "absolute-centre"

# Configuração de bordas dos painéis (Panes) - Transparência injetada
setw -g pane-border-status top
setw -g pane-border-format ""
setw -g pane-active-border-style "bg=default,fg=#{@thm_overlay_0}"
setw -g pane-border-style "bg=default,fg=#{@thm_surface_0}"
setw -g pane-border-lines single

# Comportamento de formatação de janelas (Windows)
set -wg automatic-rename on
set -g automatic-rename-format "Window"

# As janelas inativas adotam fundo transparente
set -g window-status-format " #I#{?#{!=:#{window_name},Window},: #W,} "
set -g window-status-style "bg=default,fg=#{@thm_rosewater}"
set -g window-status-last-style "bg=default,fg=#{@thm_peach}"
set -g window-status-activity-style "bg=#{@thm_red},fg=default"
set -g window-status-bell-style "bg=#{@thm_red},fg=default,bold"
set -gF window-status-separator "#[bg=default,fg=#{@thm_overlay_0}]│"

# A janela ativa mantém a pílula sólida (peach) para contraste e ergonomia
set -g window-status-current-format " #I#{?#{!=:#{window_name},Window},: #W,} "
set -g window-status-current-style "bg=#{@thm_peach},fg=#{@thm_bg},bold"

# =============================================================================
# 5. INICIALIZAÇÃO DE BOOTSTRAP E GERENCIADOR DE PACOTES
# =============================================================================

# Rotina de instalação autônoma do TPM (Bootstrap)
if "test ! -d #{TMUX_PLUGIN_MANAGER_PATH}/tpm" \
   "run 'git clone https://github.com/tmux-plugins/tpm #{TMUX_PLUGIN_MANAGER_PATH}/tpm && #{TMUX_PLUGIN_MANAGER_PATH}/tpm/bin/install_plugins'"

# Inicializa o gerenciador de plugins do TMUX (Esta linha DEVE ser a última do arquivo)
run '#{TMUX_PLUGIN_MANAGER_PATH}/tpm/tpm'